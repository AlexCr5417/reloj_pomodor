<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body>
    <div id="container">
      <div id="header">Reloj pomodoro</div>
      <div id="navbar"></div>
      <div id="main">
        <div class="header_main"></div>
        <div class="clock_main">
          <div class="clock_cycles_main">0/0</div>
          <div class="clock_timer_main">00:00:00</div>
        </div>
        <div class="buttons_main">
          <div class="buttons_main_container"></div>
        </div>
        <div class="table_main"></div>
      </div>
    </div>
    <div class="overlay">
      <div class="form_clock">
        <div class="form_clock_header">
          <div class="form_clock_header_title">Configuracion temporizador</div>
        </div>
        <div class="form_clock_main">
          <div class="cycle">
            <div class="repeat">
              <div class="cycle_title">Repeticiones</div>
              <input
                class="repeat_number"
                type="number"
                name=""
                id=""
                value="1"
              />
            </div>
            <div class="cycle_title">Ciclo</div>
            <div class="container_cycles">
              <div class="cycle_card" id="cycle_card_1">
                <input
                  class="cycle_card_title"
                  type="text"
                  name=""
                  id=""
                  value="Bloque 1"
                />
                <div class="cycle_card_timer">
                  <input
                    class="cycle_card_timer_content"
                    type="number"
                    name=""
                    id=""
                    min="0"
                    placeholder="horas"
                  />
                  <input
                    class="cycle_card_timer_content"
                    type="number"
                    name=""
                    id=""
                    min="0"
                    max="60"
                    placeholder="minutos"
                  />
                  <input
                    class="cycle_card_timer_content"
                    type="number"
                    name=""
                    id=""
                    min="0"
                    max="60"
                    placeholder="segundos"
                  />
                </div>
                <div class="cycle_card_options">-</div>
              </div>
            </div>
            <div class="cycle_card_plus">+ Añadir bloque</div>
          </div>
          <div class="alarm_setting">
            <div class="cycle_title">Tipo de Transicion</div>
            <div class="alarm_slider_container">
              <input type="range" id="alarm_mood" min="1" max="3" value="2" step="1">
              <div class="alarm_labels">
                <span id="label_zen">🧘 Zen</span>
                <span id="label_active" class="active_mood">⚡ Activo</span>
                <span id="label_alert">🚨 Alerta</span>
              </div>
            </div>
          </div>
        </div>
        <div class="form_clock_footer">
          <div
            id="form_clock_footer_button_cancel"
            class="form_clock_footer_button"
          >
            Cancelar
          </div>
          <div
            id="form_clock_footer_button_save"
            class="form_clock_footer_button"
          >
            Guardar
          </div>
        </div>
      </div>
      <div class="card_end_cycle">
        <div class="card_end_cycle_body">
          <div class="card_end_cycle_body_menssage">
            ¿Quieres continuar?
          </div>
          <div class="card_end_cycle_body_buttons">
            <div class="card_end_cycle_body_buttons_continue">
              Continuar
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
